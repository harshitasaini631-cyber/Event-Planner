<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EventPlanner</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

 <!-- Navbar section -->
  <nav class="navbar">
    <h2>EventPlanner</h2>
    <ul>
      <li>Home</li>
      <li>Events</li>
      <li>Contact</li>
    </ul>
  </nav>

<!-- Hero section -->
  <section class="hero">
    <h1>Discover Amazing Events Near You.</h1>
    <p>Book tickets for concerts, workshops & more.</p>
    <button>Explore Events</button>
  </section>


  <!-- Events section -->
  <section class="events">
    <h2>Upcoming Events</h2>

    <div class="event-container">
      <div class="card">
        <h3>Music Concert</h3>
        <p>Delhi | April 30</p>
        <button>Book Now</button>
      </div>

      <div class="card">
        <h3>Tech Workshop</h3>
        <p>Online | May 5</p>
        <button>Book Now</button>
      </div>

      <div class="card">
        <h3>Art Exhibition</h3>
        <p>Mumbai | May 10</p>
        <button>Book Now</button>
      </div>
    </div>
  </section>


  <footer>
    <p>© 2026 EventPlanner. All rights reserved.</p>
  </footer>

</body>
</html>
